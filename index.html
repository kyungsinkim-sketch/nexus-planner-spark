<!doctype html>
<html lang="ko" class="dark" style="background:#0C0A1E">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />

  <!-- App Info -->
  <title>Re-Be.io</title>
  <meta name="description" content="Re-Be.io 프로젝트 관리 및 협업 플랫폼" />
  <meta name="author" content="Re-Be.io" />

  <!-- PWA Meta Tags -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0C0A1E" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Re-Be" />

  <!-- iOS Icons -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

  <!-- Splash Screens for iOS -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

  <!-- Open Graph -->
  <meta property="og:title" content="Re-Be.io" />
  <meta property="og:description" content="Creative Production & Collaboration Platform" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://re-be.io" />
  <meta property="og:image" content="https://re-be.io/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Re-Be.io" />
  <meta name="twitter:description" content="Creative Production & Collaboration Platform" />
  <meta name="twitter:image" content="https://re-be.io/og-image.png" />

  <!-- Preconnect to Supabase -->
  <link rel="preconnect" href="https://supabase.co" />

  <!-- Prevent text size adjust on orientation change -->
  <style>
    html {
      -webkit-text-size-adjust: 100%;
      -moz-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    /* iOS safe area: body bg must match app theme to fill notch/home indicator */
    html, body {
      padding: 0;
      margin: 0;
    }
    /* Pass safe area insets as CSS variables for components to use */
    :root {
      --sat: env(safe-area-inset-top);
      --sar: env(safe-area-inset-right);
      --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left);
    }
  </style>
  <!-- Prevent browser extensions from crashing React (removeChild error) -->
  <script>
    if (typeof Node === 'function' && Node.prototype) {
      const origRemoveChild = Node.prototype.removeChild;
      Node.prototype.removeChild = function(child) {
        if (child.parentNode !== this) {
          console.warn('[DOM] removeChild: node is not a child — skipped (likely browser extension)');
          return child;
        }
        return origRemoveChild.call(this, child);
      };
      const origInsertBefore = Node.prototype.insertBefore;
      Node.prototype.insertBefore = function(newNode, refNode) {
        if (refNode && refNode.parentNode !== this) {
          console.warn('[DOM] insertBefore: refNode is not a child — skipped (likely browser extension)');
          return newNode;
        }
        return origInsertBefore.call(this, newNode, refNode);
      };
    }
  </script>
</head>

<body style="background:#0C0A1E;margin:0;padding:0">
  <div id="root"></div>
  <!-- Global loading screen — visible until React app hides it -->
  <div id="global-loader" style="position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#0C0A1E;">
    <img src="/loading-star.png" alt="Re-Be" width="80" height="80" style="animation:spin 20s linear infinite" />
  </div>
  <style>@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Auto-recover from stale SW cache: if dynamic import fails, nuke SW + caches and reload -->
  <script>
    window.addEventListener('error', function(e) {
      if (e.message && e.message.includes('Failed to fetch dynamically imported module')) {
        console.warn('[App] Stale chunk detected, clearing SW and caches...');
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
        }
        caches.keys().then(function(names) {
          return Promise.all(names.map(function(n) { return caches.delete(n); }));
        }).then(function() {
          window.location.reload();
        });
      }
    });
    window.addEventListener('unhandledrejection', function(e) {
      if (e.reason && String(e.reason).includes('Failed to fetch dynamically imported module')) {
        console.warn('[App] Stale chunk (promise), clearing SW and caches...');
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
        }
        caches.keys().then(function(names) {
          return Promise.all(names.map(function(n) { return caches.delete(n); }));
        }).then(function() {
          window.location.reload();
        });
      }
    });
  </script>

  <!-- Register Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Disable Service Worker in development (localhost)
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            for (let registration of registrations) {
              registration.unregister().then((boolean) => {
                if (boolean) console.log('[App] Service Worker unregistered for localhost');
              });
            }
          });
          return;
        }

        // Register Service Worker in production
        navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
          .then((registration) => {
            console.log('[App] Service Worker registered:', registration.scope);
            // Check for updates
            registration.onupdatefound = () => {
              const installingWorker = registration.installing;
              if (installingWorker == null) {
                return;
              }
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed') {
                  if (navigator.serviceWorker.controller) {
                    console.log('[App] New content is available and will be used when all tabs for this page are closed.');
                  } else {
                    console.log('[App] Content is cached for offline use.');
                  }
                }
              };
            };
          })
          .catch((error) => {
            console.error('[App] Service Worker registration failed:', error);
          });
      });
    }
  </script>
</body>

</html>
